services:
  postgres:
    image: postgres:17-alpine
    container_name: superhrd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superhrd}
      POSTGRES_USER: ${POSTGRES_USER:-superhrd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superhrd_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - superhrd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-superhrd} -d ${POSTGRES_DB:-superhrd}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  superhrd:
    build:
      context: .
      dockerfile: Dockerfile
    image: superhrd:latest
    container_name: superhrd
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-superhrd}:${POSTGRES_PASSWORD:-superhrd_dev_password}@postgres:5432/${POSTGRES_DB:-superhrd}?schema=public
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-generate-a-random-secret-here}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${SUPERHRD_PORT:-3000}}
      APP_URL: ${APP_URL:-http://localhost:${SUPERHRD_PORT:-3000}}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://host.docker.internal:5678/webhook/pdf}
      N8N_CALLBACK_SECRET: ${N8N_CALLBACK_SECRET:-generate-a-random-secret-here}
    ports:
      - "${SUPERHRD_PORT:-3000}:3000"
    volumes:
      - superhrd_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  superhrd_postgres_data:
  superhrd_uploads:
